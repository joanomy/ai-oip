# Local development services.
#
#   docker compose up -d postgres     # dev/integration database
#
# Then run integration tests against it:
#   INTEGRATION_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/ai_oip_test uv run pytest tests/integration
#
# The app image itself builds from ./Dockerfile (`docker compose build app`);
# it gains a real entrypoint at the walking-skeleton milestone.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_oip_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_oip_test

volumes:
  pgdata:
