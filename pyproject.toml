[project]
name = "ai-platform"
version = "0.0.1"
description = "Production-grade autonomous AI agent platform."
requires-python = ">=3.12"
readme = "README.md"
dependencies = []

[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pre-commit>=3.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_platform"]

# ---- Ruff: lint + format ----
[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort (import sorting)
    "UP",            # pyupgrade (modern syntax)
    "B",             # bugbear (common bug patterns)
    "SIM",           # simplify
    "ANN",           # require type annotations
]


[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN"]  # tests don't require full annotation coverage

# ---- mypy: strict type checking ----
[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
exclude = ["tests/"]

# ---- pytest ----
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=src/ai_platform --cov-report=term-missing"
